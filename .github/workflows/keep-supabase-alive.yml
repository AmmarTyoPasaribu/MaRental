name: Keep Supabase Alive

# Supabase free-tier projects auto-pause after ~7 days without activity.
# This workflow pings the REST API every 3 days so the project never goes idle.
on:
  schedule:
    - cron: '0 3 */3 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_KEY secret is not set in repo settings"
            exit 1
          fi

          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/cars?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")

          echo "Supabase responded with HTTP $status"

          if [ "$status" -ge 400 ]; then
            echo "::error::Supabase ping failed with status $status"
            exit 1
          fi
